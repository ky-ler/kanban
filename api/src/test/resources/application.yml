spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/velora}
    username: ${DB_USERNAME:username}
    password: ${DB_PASSWORD:password}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:https://test.example.com/}
          audiences: ${JWT_AUDIENCES:https://test-api}
