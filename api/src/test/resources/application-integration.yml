spring:
  datasource:
    hikari:
      maximum-pool-size: 4
      minimum-idle: 1
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://test.example.com/
          audiences: https://test-api
velora:
  security:
    custom-claim-prefix: https://velora.kylerriggs.com/claims/
    cors-allowed-origins:
      - http://localhost:5173
