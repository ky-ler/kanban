spring:
  application:
    name: velora
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
      data-source-properties:
        tcpKeepAlive: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    database: postgresql
  flyway:
    enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI}
          audiences: ${JWT_AUDIENCES}
springdoc:
  default-produces-media-type: application/json
  api-docs:
    path: /api-docs
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
logging:
  level:
    root: INFO
    com.kylerriggs.velora: INFO
velora:
  security:
    custom-claim-prefix: https://velora.kylerriggs.com/claims/
    cors-allowed-origins: ${CORS_ALLOWED_ORIGINS}
  board:
    max-boards-per-user: 10
    default-columns:
      - Backlog
      - To Do
      - In Progress
      - Done
      - Canceled
